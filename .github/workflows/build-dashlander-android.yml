name: Build Dashlander Android

on:
  workflow_dispatch:
  push:
    branches:
      - dashlander-console
    paths:
      - 'dashlander-android/**'
      - '.github/workflows/build-dashlander-android.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        working-directory: dashlander-android
        run: gradle :app:assembleDebug --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: dashlander-console-debug-apk
          path: dashlander-android/app/build/outputs/apk/debug/*.apk
