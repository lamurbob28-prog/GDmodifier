name: Upload GMD to Geometry Dash

on:
  workflow_dispatch:
    inputs:
      gmd_path:
        description: "Path to .gmd file in this repo, for example uploads/level.gmd"
        required: true
        default: "uploads/level.gmd"
      gd_username:
        description: "Burner Geometry Dash username"
        required: true
      gd_account_id:
        description: "Burner Geometry Dash accountID. Leave blank to try lookup."
        required: false
        default: ""
      level_name_override:
        description: "Optional level name override"
        required: false
        default: ""
      description_override:
        description: "Optional level description"
        required: false
        default: ""
      visibility:
        description: "Upload visibility"
        required: true
        type: choice
        options:
          - public
          - unlisted
        default: public
      upload_mode:
        description: "Upload protocol order"
        required: true
        type: choice
        options:
          - modern-first
          - legacy-first
        default: modern-first
      runner:
        description: "GitHub runner to use if one platform is blocked"
        required: true
        type: choice
        options:
          - ubuntu-latest
          - windows-latest
          - macos-latest
        default: ubuntu-latest
      force_stock_song:
        description: "Set songID to 0 and use stock audioTrack"
        required: true
        type: choice
        options:
          - "false"
          - "true"
        default: "false"
      song_id_override:
        description: "Optional songID override. Leave blank normally."
        required: false
        default: ""
      audio_track_override:
        description: "Optional stock audioTrack override. Leave blank normally."
        required: false
        default: ""

permissions:
  contents: read

env:
  PYTHONUNBUFFERED: "1"

jobs:
  upload:
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 8

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Show selected input
        shell: bash
        run: |
          echo "GMD path: ${{ inputs.gmd_path }}"
          echo "Username: ${{ inputs.gd_username }}"
          echo "Visibility: ${{ inputs.visibility }}"
          echo "Upload mode: ${{ inputs.upload_mode }}"
          echo "Runner: ${{ inputs.runner }}"
          echo "Force stock song: ${{ inputs.force_stock_song }}"
          echo "Song ID override: ${{ inputs.song_id_override }}"
          echo "Audio track override: ${{ inputs.audio_track_override }}"

      - name: Upload .gmd to Geometry Dash
        env:
          GD_PASSWORD: ${{ secrets.GD_PASSWORD }}
          GMD_PATH: ${{ inputs.gmd_path }}
          GD_USERNAME: ${{ inputs.gd_username }}
          GD_ACCOUNT_ID: ${{ inputs.gd_account_id }}
          LEVEL_NAME_OVERRIDE: ${{ inputs.level_name_override }}
          DESCRIPTION_OVERRIDE: ${{ inputs.description_override }}
          VISIBILITY: ${{ inputs.visibility }}
          UPLOAD_MODE: ${{ inputs.upload_mode }}
          FORCE_STOCK_SONG: ${{ inputs.force_stock_song }}
          SONG_ID_OVERRIDE: ${{ inputs.song_id_override }}
          AUDIO_TRACK_OVERRIDE: ${{ inputs.audio_track_override }}
        run: python uploader/upload_gmd.py

      - name: Upload debug attempts on failure
        if: failure() && hashFiles('gdmodifier_debug_attempts.json') != ''
        uses: actions/upload-artifact@v4
        with:
          name: gdmodifier-debug-attempts-${{ inputs.runner }}
          path: gdmodifier_debug_attempts.json
